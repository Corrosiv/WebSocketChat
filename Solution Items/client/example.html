<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live Chat - Test Client</title>
  <style>
    /* Spinner and skeleton styles for message history loading */
    #historyLoading { display: none; align-items: center; gap: 8px; }
    .spinner { width: 16px; height: 16px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton { background: #eee; height: 14px; margin: 6px 0; border-radius: 4px; }
    .skeleton.wave { background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: wave 1.5s linear infinite; }
    @keyframes wave { from { background-position: 200% 0 } to { background-position: -200% 0 } }
  </style>
</head>
<body>
  <h3>Live Chat Test Client</h3>
  <label>Username: <input id="username" /></label>
  <label>Server WS URL: <input id="serverUrl" value="ws://localhost:5223/ws" style="width:220px" /></label>
  <button id="connect">Connect</button>
  <button id="disconnect" disabled>Disconnect</button>
  <button id="loadMore" style="display:none; margin-left:8px">Load older</button>
  <button id="retry" style="display:none">Retry</button>
  <div id="status">Disconnected</div>
  <div id="messages" style="border:1px solid #ccc; padding:8px; height:300px; overflow:auto;"></div>
  <div id="historyLoading" style="font-size:12px; color:#666; margin:6px 0; display:none">
    <svg class="spinner" viewBox="0 0 50 50" aria-hidden="true" focusable="false">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#666" stroke-width="4" stroke-linecap="round" stroke-dasharray="31.4 31.4"></circle>
    </svg>
    <span>Loading message history…</span>
  </div>
  <div id="typing" style="font-style:italic; color:#666; margin-top:6px"></div>
  <input id="message" placeholder="Type message..." />
  <button id="send">Send</button>

  <script>
    let ws;
    let historyLimit = 50;
    let historyOffset = 0;
    let historyTotal = 0;
    document.getElementById('connect').addEventListener('click', () => {
      const username = document.getElementById('username').value || 'anon';
      const serverUrlInput = document.getElementById('serverUrl').value;
      const wsUrl = serverUrlInput && serverUrlInput.length > 0 ? serverUrlInput : `ws://${location.host}/ws`;
      try {
        ws = new WebSocket(wsUrl);
      } catch (err) {
        document.getElementById('status').innerText = `Connection error: ${err}`;
        return;
      }
      ws.onopen = async () => {
        setStatus('Connected');
        // Load recent message history from the HTTP API and render as initial chat state
        try {
          // derive HTTP base from WS url (ws://host[:port]/ws -> http://host[:port])
          const serverUrlInput = document.getElementById('serverUrl').value;
          const wsBase = serverUrlInput && serverUrlInput.length > 0 ? serverUrlInput : `ws://${location.host}/ws`;
          const httpBase = wsBase.replace(/^wss:/i, 'https:').replace(/^ws:/i, 'http:').replace(/\/ws\/?$/i, '');
          const resp = await fetch(httpBase + `/api/messages?limit=${historyLimit}&offset=${historyOffset}`);
          if (resp.ok) {
            const page = await resp.json();
            // clear existing messages area and render history
            container.innerHTML = '';
            const items = page.items || page.Items || [];
            historyTotal = page.total || page.Total || 0;
            // render items in natural order (oldest->newest) for initial load
            items.forEach(m => renderMessage(m, /*isHistory*/ true));
            // show load more button if there are older messages
            if ((historyOffset + items.length) < historyTotal) {
              loadMoreBtn.style.display = 'inline-block';
            } else {
              loadMoreBtn.style.display = 'none';
            }
            // prepare offset for next (older) page
            historyOffset += historyLimit;
          }
        } catch (err) {
          console.warn('Failed to load message history', err);
        }

        // Announce username to the server using a join message
        const join = { type: 'join', username };
        ws.send(JSON.stringify(join));
      };
      ws.onerror = (ev) => {
        document.getElementById('status').innerText = 'WebSocket error';
      };
      ws.onclose = () => {
        document.getElementById('status').innerText = 'Closed';
      };
      ws.onmessage = e => {
        try {
          const m = JSON.parse(e.data);
          renderMessage(m, /*isHistory*/ false);
        } catch (ex) {
          console.warn('Failed to parse message', ex, e.data);
        }
      };
    });

    document.getElementById('send').addEventListener('click', () => {
      const content = document.getElementById('message').value;
      const username = document.getElementById('username').value || 'anon';
      if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Not connected');
      const payload = { type: 'message', username, content };
      ws.send(JSON.stringify(payload));
    });

    // typing indicator: send typing events while the user types
    let typingTimer;
    const typingEl = document.getElementById('typing');
    document.getElementById('message').addEventListener('input', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      // send typing=true
      const username = document.getElementById('username').value || 'anon';
      ws.send(JSON.stringify({ type: 'typing', username, isTyping: true }));
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        ws.send(JSON.stringify({ type: 'typing', username, isTyping: false }));
      }, 1000);
    });

    // update typing UI when typing events arrive
    const originalOnMessage = window.wsOnMessage; // not set; safe guard

    function renderMessage(m, isHistory) {
      const el = document.createElement('div');
      const ts = m.timestamp || '';
      if (m.type === 'join') {
        el.textContent = `[${ts}] ${m.username} joined`;
        el.style.fontStyle = 'italic';
        el.style.color = '#444';
      } else if (m.type === 'leave') {
        el.textContent = `[${ts}] ${m.username} left`;
        el.style.fontStyle = 'italic';
        el.style.color = '#444';
      } else if (m.type === 'message') {
        el.textContent = `[${ts}] ${m.username || ''}: ${m.content || JSON.stringify(m)}`;
      } else if (m.type === 'typing') {
        // typing events are displayed in the typing region rather than messages list
        const typingEl = document.getElementById('typing');
        if (m.isTyping) {
          typingEl.textContent = `${m.username} is typing...`;
        } else {
          if (typingEl.textContent && typingEl.textContent.startsWith(m.username)) {
            typingEl.textContent = '';
          }
        }
        return;
      } else {
        el.textContent = JSON.stringify(m);
      }

      // if rendering history, insert at top; otherwise append
      const container = document.getElementById('messages');
      if (isHistory) {
        // show older messages first; insert before first child
        if (container.firstChild) container.insertBefore(el, container.firstChild);
        else container.appendChild(el);
      } else {
        container.appendChild(el);
        // keep scroll pinned to bottom when new messages arrive
        container.scrollTop = container.scrollHeight;
      }
    }

    // load older messages when requested
    document.getElementById('loadMore').addEventListener('click', async () => {
      const loadMoreBtn = document.getElementById('loadMore');
      const loadingEl = document.getElementById('historyLoading');
      const container = document.getElementById('messages');
      loadingEl.style.display = 'flex';
      try {
        const serverUrlInput = document.getElementById('serverUrl').value;
        const wsBase = serverUrlInput && serverUrlInput.length > 0 ? serverUrlInput : `ws://${location.host}/ws`;
        const httpBase = wsBase.replace(/^wss:/i, 'https:').replace(/^ws:/i, 'http:').replace(/\/ws\/?$/i, '');
        const resp = await fetch(httpBase + `/api/messages?limit=${historyLimit}&offset=${historyOffset}`);
        if (resp.ok) {
          const page = await resp.json();
          const items = page.items || page.Items || [];
          // insert older messages above existing; iterate in reverse so order remains oldest->newest
          for (let i = items.length - 1; i >= 0; i--) {
            renderMessage(items[i], /*isHistory*/ true);
          }
          historyTotal = page.total || page.Total || historyTotal;
          historyOffset += historyLimit;
          if ((historyOffset) >= historyTotal) loadMoreBtn.style.display = 'none';
        }
      } catch (err) {
        console.warn('Failed to load older messages', err);
      } finally {
        loadingEl.style.display = 'none';
      }
    });

    // initialize UI state
    setStatus('Disconnected', 'disconnected');
    updateUiForState();
  </script>
</body>
</html>
