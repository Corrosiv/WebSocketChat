<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live Chat - Test Client</title>
</head>
<body>
  <h3>Live Chat Test Client</h3>
  <label>Username: <input id="username" /></label>
  <label>Server WS URL: <input id="serverUrl" value="ws://localhost:5223/ws" style="width:220px" /></label>
  <button id="connect">Connect</button>
  <button id="disconnect" disabled>Disconnect</button>
  <button id="retry" style="display:none">Retry</button>
  <div id="status">Disconnected</div>
  <div id="messages" style="border:1px solid #ccc; padding:8px; height:300px; overflow:auto;"></div>
  <input id="message" placeholder="Type message..." />
  <button id="send">Send</button>

  <script>
    let ws;
    document.getElementById('connect').addEventListener('click', () => {
      const username = document.getElementById('username').value || 'anon';
      const serverUrlInput = document.getElementById('serverUrl').value;
      const wsUrl = serverUrlInput && serverUrlInput.length > 0 ? serverUrlInput : `ws://${location.host}/ws`;
      try {
        ws = new WebSocket(wsUrl);
      } catch (err) {
        document.getElementById('status').innerText = `Connection error: ${err}`;
        return;
      }
      ws.onopen = () => {
        document.getElementById('status').innerText = 'Connected';
        // Announce username to the server using a join message
        const join = { type: 'join', username };
        ws.send(JSON.stringify(join));
      };
      ws.onerror = (ev) => {
        document.getElementById('status').innerText = 'WebSocket error';
      };
      ws.onclose = () => {
        document.getElementById('status').innerText = 'Closed';
      };
      ws.onmessage = e => {
        try {
          const m = JSON.parse(e.data);
          const el = document.createElement('div');
          el.textContent = `[${m.timestamp || ''}] ${m.username || ''}: ${m.content || JSON.stringify(m)}`;
          document.getElementById('messages').appendChild(el);
        } catch (ex) {
          console.warn('Failed to parse message', ex, e.data);
        }
      };
    });

    document.getElementById('send').addEventListener('click', () => {
      const content = document.getElementById('message').value;
      const username = document.getElementById('username').value || 'anon';
      if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Not connected');
      const payload = { type: 'message', username, content };
      ws.send(JSON.stringify(payload));
    });

    // initialize UI state
    setStatus('Disconnected', 'disconnected');
    updateUiForState();
  </script>
</body>
</html>
